name: language-learning-app

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file: ./frontend/.env

    ports:
      - 5173:5173

    networks:
      - language-learning-app

    depends_on:
      - backend

    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules
            - dist
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    env_file: ./backend/.env

    ports:
      - 3000:3000

    networks:
      - language-learning-app

    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - node_modules
            - dist

networks:
  language-learning-app:
    driver: bridge
